<div class="employee-form-page">
  <div class="form-header">
    <button class="btn-back" (click)="onCancel()">←</button>
    <h1>{{ isEditMode ? 'Edit Employee' : 'Add New Employee' }}</h1>
  </div>

  @if (errorMessage) {
    <div class="message message-error"><strong>Error:</strong> {{ errorMessage }}</div>
  }

  @if (validationMessage) {
    <div class="message message-warning">
      {{ validationMessage }}
    </div>
  }

  @if (isLoading) {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading employee details...</p>
    </div>
  } @else {
    <div class="form-card">
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input
            type="text"
            placeholder="Jane Smith"
            [(ngModel)]="formData.name"
            [disabled]="isSaving"
          />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            placeholder="jane@company.com"
            [(ngModel)]="formData.email"
            [disabled]="isSaving"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input
            type="text"
            placeholder="+1 (888) 123-4567"
            [(ngModel)]="formData.phone"
            [disabled]="isSaving"
          />
        </div>
        <div class="form-group">
          <label>Position</label>
          <input
            type="text"
            placeholder="Senior Engineer"
            [(ngModel)]="formData.position"
            [disabled]="isSaving"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <select [(ngModel)]="formData.department" [disabled]="isSaving">
            <option value="" disabled>Select department</option>
            @for (dept of departments; track dept) {
              <option [value]="dept">{{ dept }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label>Joining Date</label>
          <input type="date" [(ngModel)]="formData.joiningDate" [disabled]="isSaving" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-cancel" (click)="onCancel()" [disabled]="isSaving">Cancel</button>
        <button class="btn-save" (click)="onSave()" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : 'Save Employee' }}
        </button>
      </div>
    </div>
  }
</div>
