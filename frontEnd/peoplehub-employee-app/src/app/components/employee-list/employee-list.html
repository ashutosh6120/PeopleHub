<div class="employee-directory">
  <div class="header">
    <h1>Employee Directory</h1>
    <div class="header-actions">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          placeholder="Search by name or department..."
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()"
          [disabled]="isLoading"
        />
      </div>
      @if (isAdmin) {
        <button class="btn-add" (click)="onAdd()" [disabled]="isLoading">+ Add Employee</button>
      }
    </div>
  </div>

  @if (errorMessage) {
    <div class="error-message"><strong>Error:</strong> {{ errorMessage }}</div>
  }

  @if (isLoading) {
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Loading employees...</p>
    </div>
  } @else {
    <ag-grid-angular
      [theme]="theme"
      [rowData]="employees"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pagination]="false"
      [domLayout]="'autoHeight'"
      [rowHeight]="56"
      [headerHeight]="48"
    />

    <div class="pagination-footer">
      <div class="page-size">
        <label for="page-size">Page Size:</label>
        <select
          id="page-size"
          [value]="pageSize"
          (change)="onPageSizeChange($any($event.target).value)"
          [disabled]="isLoading"
        >
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="50">50</option>
        </select>
      </div>

      <div class="page-meta">
        <span>{{ pageStartRecord }} to {{ pageEndRecord }} of {{ totalRecords }}</span>
      </div>

      <div class="page-nav">
        <button type="button" (click)="onPreviousPage()" [disabled]="isLoading || currentPage <= 1">
          Prev
        </button>
        <span>Page {{ currentPage }} of {{ totalPages }}</span>
        <button
          type="button"
          (click)="onNextPage()"
          [disabled]="isLoading || currentPage >= totalPages"
        >
          Next
        </button>
      </div>
    </div>
  }

  <app-delete-confirm-dialog (confirmDelete)="onConfirmDelete($event)" />
</div>
