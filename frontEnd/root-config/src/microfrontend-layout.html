<single-spa-router containerEl="#app-content">
  <!--

    This is the single-spa Layout Definition for your microfrontends.
    See https://single-spa.js.org/docs/layout-definition/ for more information.

  -->

  <!-- Example layouts you might find helpful:

  <nav>
    <application name="@org/navbar"></application>
  </nav>
  <route path="settings">
    <application name="@org/settings"></application>
  </route>

  -->

  <main>
    <route path="employees">
      <application name="@people-hub/peoplehub-employee-app"></application>
    </route>
    <route path="leaves">
      <application name="@people-hub/peoplehub-leave-app"></application>
    </route>
    <route default>
      <application name="@people-hub/peoplehub-employee-app"></application>
    </route>
  </main>
</single-spa-router>
